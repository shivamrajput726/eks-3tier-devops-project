apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: three-tier-prod
resources:
  - ../../base
  - namespace.yaml
  - secret.yaml
patches:
  - path: patch-replicas.yaml
  - path: patch-ingress.yaml
images:
  - name: docker.io/library/eks-3tier-frontend
    newName: docker.io/library/eks-3tier-frontend
    newTag: stable-prod
  - name: docker.io/library/eks-3tier-backend
    newName: docker.io/library/eks-3tier-backend
    newTag: stable-prod
