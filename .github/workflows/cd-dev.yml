name: Deploy Dev

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/overlays/**"
      - "terraform/**"
      - "argocd/**"
      - "monitoring/**"
      - "README.md"
      - "troubleshooting.md"
      - "eksctl_commands.md"

permissions:
  contents: write

jobs:
  quality-gates:
    uses: ./.github/workflows/reusable-quality.yml

  build-and-publish:
    name: Build, Scan, and Publish Images
    needs: quality-gates
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      IMAGE_TAG: ${{ github.sha }}
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/eks-3tier-backend:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/eks-3tier-backend:dev-latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/eks-3tier-frontend:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/eks-3tier-frontend:dev-latest

      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: docker.io/${{ env.DOCKERHUB_NAMESPACE }}/eks-3tier-backend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: docker.io/${{ env.DOCKERHUB_NAMESPACE }}/eks-3tier-frontend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Update dev overlay image tags
        run: |
          node scripts/update-kustomization-images.mjs \
            --file "k8s/overlays/dev/kustomization.yaml" \
            --frontend-repo "docker.io/${DOCKERHUB_NAMESPACE}/eks-3tier-frontend" \
            --frontend-tag "${IMAGE_TAG}" \
            --backend-repo "docker.io/${DOCKERHUB_NAMESPACE}/eks-3tier-backend" \
            --backend-tag "${IMAGE_TAG}"

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "chore: promote dev images to ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Trigger ArgoCD sync
        if: ${{ env.ARGOCD_SERVER != '' && env.ARGOCD_AUTH_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            "https://${ARGOCD_SERVER}/api/v1/applications/eks-3tier-workloads-dev/sync"
