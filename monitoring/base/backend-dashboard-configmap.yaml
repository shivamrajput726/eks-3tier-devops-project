apiVersion: v1
kind: ConfigMap
metadata:
  name: eks-3tier-backend-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  backend-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "PBFA97CFB590B2093"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(three_tier_backend_http_requests_total[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "title": "Request Throughput",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "PBFA97CFB590B2093"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(three_tier_backend_http_request_duration_seconds_bucket[5m])) by (le, namespace))",
              "legendFormat": "{{namespace}} p95"
            }
          ],
          "title": "P95 Latency",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "PBFA97CFB590B2093"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=~\"three-tier-.*\", container=\"backend\"}) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "title": "Backend Container Restarts",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "PBFA97CFB590B2093"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"three-tier-.*\", pod=~\"backend-.*\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "title": "Backend CPU Usage",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "eks",
        "devops",
        "backend"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "EKS 3-Tier Backend Overview",
      "version": 1
    }
